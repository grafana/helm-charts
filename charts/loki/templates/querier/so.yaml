{{- $isDistributed := eq (include "loki.deployment.isDistributed" .) "true" -}}
{{- if and $isDistributed .Values.querier.kedaAutoscaling.enabled }}
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: {{ include "loki.querierFullname" . }}
  namespace: {{ include "loki.namespace" . }}
  labels:
    {{- include "loki.querierLabels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "loki.querierFullname" . }}
  minReplicaCount: {{ .Values.querier.kedaAutoscaling.minReplicas }}
  maxReplicaCount: {{ .Values.querier.kedaAutoscaling.maxReplicas }}
  pollingInterval: {{ coalesce .Values.querier.kedaAutoscaling.pollingInterval .Values.defaults.kedaAutoscaling.pollingInterval }}
  cooldownPeriod: {{ .Values.querier.kedaAutoscaling.cooldownPeriod }}
  {{- with .Values.querier.kedaAutoscaling.fallback }}
  fallback:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.querier.kedaAutoscaling.behavior }}
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        {{- toYaml . | nindent 8 }}
  {{- end }}
  triggers:
    {{- tpl (.Values.querier.kedaAutoscaling.triggers | toYaml) $ | nindent 4 }}
{{- end }}
