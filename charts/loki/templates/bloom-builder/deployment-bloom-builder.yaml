{{- $isDistributed := eq (include "loki.deployment.isDistributed" .) "true" -}}
{{- if (and $isDistributed (gt (int .Values.bloomPlanner.replicas) 0)) -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "loki.bloomBuilderFullname" . }}
  namespace: {{ include "loki.namespace" . }}
  labels:
    {{- include "loki.bloomBuilderLabels" . | nindent 4 }}
    {{- with (coalesce .Values.bloomBuilder.labels .Values.defaults.labels .Values.loki.labels) }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with (coalesce .Values.bloomBuilder.annotations .Values.defaults.annotations .Values.loki.annotations) }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if not .Values.bloomBuilder.autoscaling.enabled }}
  replicas: {{ .Values.bloomBuilder.replicas }}
  {{- end }}
  {{- with .Values.bloomBuilder.strategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  revisionHistoryLimit: {{ .Values.loki.revisionHistoryLimit }}
  selector:
    matchLabels:
      {{- include "loki.bloomBuilderSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- include "loki.config.checksum" . | nindent 8 }}
        {{- with .Values.loki.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.bloomBuilder.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "loki.bloomBuilderLabels" . | nindent 8 }}
        app.kubernetes.io/part-of: memberlist
        {{- with merge (dict) .Values.loki.podLabels .Values.defaults.podLabels .Values.bloomBuilder.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- include "loki.pod" (dict "target" "bloom-builder" "component" .Values.bloomBuilder "ctx" .) | nindent 6 }}
{{- end -}}
