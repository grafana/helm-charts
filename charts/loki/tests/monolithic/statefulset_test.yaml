# $schema: https://raw.githubusercontent.com/helm-unittest/helm-unittest/refs/heads/main/schema/helm-testsuite.json
suite: single-binary statefulset
templates:
  - monolithic/statefulset.yaml
  - config.yaml
set:
  deploymentMode: SingleBinary
  loki.useTestSchema: true
  loki.storage.bucketNames.chunks: chunks
  loki.storage.bucketNames.ruler: ruler
  loki.storage.bucketNames.admin: admin

tests:
  - it: should not render when deploymentMode is not single binary
    set:
      deploymentMode: Distributed
    asserts:
      - hasDocuments:
          count: 0
        template: monolithic/statefulset.yaml

  - it: should render one StatefulSet for single binary mode
    asserts:
      - hasDocuments:
          count: 1
        template: monolithic/statefulset.yaml
      - isKind:
          of: StatefulSet
        template: monolithic/statefulset.yaml

  - it: should set expected metadata labels
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/component"]
          value: single-binary
        template: monolithic/statefulset.yaml
      - equal:
          path: metadata.labels["app.kubernetes.io/part-of"]
          value: memberlist
        template: monolithic/statefulset.yaml

  - it: should merge common and component statefulset annotations
    set:
      loki.annotations:
        loki-annotation: loki-value
      singleBinary.annotations:
        single-binary-annotation: single-binary-value
    asserts:
      - equal:
          path: metadata.annotations["loki-annotation"]
          value: loki-value
        template: monolithic/statefulset.yaml
      - equal:
          path: metadata.annotations["single-binary-annotation"]
          value: single-binary-value
        template: monolithic/statefulset.yaml

  - it: should set replicas to 1 by default
    asserts:
      - equal:
          path: spec.replicas
          value: 1
        template: monolithic/statefulset.yaml

  - it: should set replicas from singleBinary.replicas when using object storage and replicas is greater than 1
    set:
      singleBinary.replicas: 3
    asserts:
      - equal:
          path: spec.replicas
          value: 3
        template: monolithic/statefulset.yaml

  - it: should omit replicas when autoscaling is enabled
    set:
      singleBinary.autoscaling.enabled: true
    asserts:
      - notExists:
          path: spec.replicas
        template: monolithic/statefulset.yaml

  - it: should omit replicas when kedaAutoscaling is enabled
    set:
      singleBinary.kedaAutoscaling.enabled: true
    asserts:
      - notExists:
          path: spec.replicas
        template: monolithic/statefulset.yaml

  - it: should set expected statefulset spec fields
    asserts:
      - equal:
          path: spec.podManagementPolicy
          value: Parallel
        template: monolithic/statefulset.yaml
      - equal:
          path: spec.serviceName
          value: RELEASE-NAME-loki-headless
        template: monolithic/statefulset.yaml
      - equal:
          path: spec.revisionHistoryLimit
          value: 10
        template: monolithic/statefulset.yaml
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/component"]
          value: single-binary
        template: monolithic/statefulset.yaml

  - it: should set storage size pod annotation when persistence is enabled
    set:
      singleBinary.persistence.enabled: true
      singleBinary.persistence.size: 42Gi
    asserts:
      - equal:
          path: spec.template.metadata.annotations["storage/size"]
          value: 42Gi
        template: monolithic/statefulset.yaml

  - it: should not set storage size pod annotation when persistence is disabled
    set:
      singleBinary.persistence.enabled: false
    asserts:
      - notExists:
          path: spec.template.metadata.annotations["storage/size"]
        template: monolithic/statefulset.yaml

  - it: should merge user pod annotations together with generated storage size annotation
    set:
      singleBinary.persistence.enabled: true
      singleBinary.persistence.size: 15Gi
      singleBinary.podAnnotations:
        custom-annotation: custom-value
    asserts:
      - equal:
          path: spec.template.metadata.annotations["storage/size"]
          value: 15Gi
        template: monolithic/statefulset.yaml
      - equal:
          path: spec.template.metadata.annotations["custom-annotation"]
          value: custom-value
        template: monolithic/statefulset.yaml

  - it: should let user podAnnotations override generated storage size annotation
    set:
      singleBinary.persistence.enabled: true
      singleBinary.persistence.size: 10Gi
      singleBinary.podAnnotations:
        storage/size: overridden-by-user
    asserts:
      - equal:
          path: spec.template.metadata.annotations["storage/size"]
          value: overridden-by-user
        template: monolithic/statefulset.yaml

  - it: should render volumeClaimTemplates when persistence is enabled
    set:
      singleBinary.persistence.enabled: true
      singleBinary.persistence.size: 25Gi
    asserts:
      - exists:
          path: spec.volumeClaimTemplates
        template: monolithic/statefulset.yaml
      - equal:
          path: spec.volumeClaimTemplates[0].metadata.name
          value: storage
        template: monolithic/statefulset.yaml
      - equal:
          path: spec.volumeClaimTemplates[0].spec.resources.requests.storage
          value: 25Gi
        template: monolithic/statefulset.yaml
      - equal:
          path: spec.volumeClaimTemplates[0].spec.accessModes[0]
          value: ReadWriteOnce
        template: monolithic/statefulset.yaml

  - it: should not render volumeClaimTemplates when persistence is disabled
    set:
      singleBinary.persistence.enabled: false
    asserts:
      - notExists:
          path: spec.volumeClaimTemplates
        template: monolithic/statefulset.yaml

  - it: should render PVC annotations labels selector and storageClass when configured
    set:
      singleBinary.persistence.annotations:
        pvc-annotation: pvc-value
      singleBinary.persistence.labels:
        pvc-label: pvc-value
      singleBinary.persistence.selector:
        matchLabels:
          volume: loki-storage
      singleBinary.persistence.storageClass: gp3
    asserts:
      - equal:
          path: spec.volumeClaimTemplates[0].metadata.annotations["pvc-annotation"]
          value: pvc-value
        template: monolithic/statefulset.yaml
      - equal:
          path: spec.volumeClaimTemplates[0].metadata.labels["pvc-label"]
          value: pvc-value
        template: monolithic/statefulset.yaml
      - equal:
          path: spec.volumeClaimTemplates[0].spec.selector.matchLabels.volume
          value: loki-storage
        template: monolithic/statefulset.yaml
      - equal:
          path: spec.volumeClaimTemplates[0].spec.storageClassName
          value: gp3
        template: monolithic/statefulset.yaml

  - it: should render empty storageClassName when persistence.storageClass is dash
    set:
      singleBinary.persistence.storageClass: "-"
    asserts:
      - equal:
          path: spec.volumeClaimTemplates[0].spec.storageClassName
          value: ""
        template: monolithic/statefulset.yaml

  - it: should render persistentVolumeClaimRetentionPolicy when auto delete PVC is enabled
    set:
      singleBinary.persistence.enabled: true
      singleBinary.persistence.enableStatefulSetAutoDeletePVC: true
      singleBinary.persistence.whenDeleted: Delete
      singleBinary.persistence.whenScaled: Retain
    asserts:
      - equal:
          path: spec.persistentVolumeClaimRetentionPolicy.whenDeleted
          value: Delete
        template: monolithic/statefulset.yaml
      - equal:
          path: spec.persistentVolumeClaimRetentionPolicy.whenScaled
          value: Retain
        template: monolithic/statefulset.yaml

  - it: should not render persistentVolumeClaimRetentionPolicy when auto delete PVC is disabled
    set:
      singleBinary.persistence.enableStatefulSetAutoDeletePVC: false
    asserts:
      - notExists:
          path: spec.persistentVolumeClaimRetentionPolicy
        template: monolithic/statefulset.yaml

  - it: should render memory-backed storage volume when persistence.inMemory is enabled
    set:
      singleBinary.persistence.enabled: false
      singleBinary.persistence.inMemory: true
      singleBinary.persistence.size: 5Gi
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: storage
            emptyDir:
              medium: Memory
              sizeLimit: 5Gi
        template: monolithic/statefulset.yaml
      - notExists:
          path: spec.volumeClaimTemplates
        template: monolithic/statefulset.yaml
