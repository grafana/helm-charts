# $schema: https://raw.githubusercontent.com/helm-unittest/helm-unittest/refs/heads/main/schema/helm-testsuite.json
suite: loki canary service account and image
templates:
  - loki-canary/daemonset.yaml
  - loki-canary/serviceaccount.yaml
  - config.yaml

set:
  deploymentMode: SingleBinary
  loki.useTestSchema: true
  loki.storage.bucketNames.chunks: chunks
  loki.storage.bucketNames.ruler: ruler
  loki.storage.bucketNames.admin: admin

tests:
  - it: uses canary service account name by default
    asserts:
      - template: loki-canary/daemonset.yaml
        equal:
          path: spec.template.spec.serviceAccountName
          value: RELEASE-NAME-loki-canary
      - template: loki-canary/serviceaccount.yaml
        equal:
          path: metadata.name
          value: RELEASE-NAME-loki-canary

  - it: uses canary service account name on Deployment workload
    set:
      lokiCanary.kind: Deployment
    asserts:
      - template: loki-canary/daemonset.yaml
        equal:
          path: kind
          value: Deployment
      - template: loki-canary/daemonset.yaml
        equal:
          path: spec.template.spec.serviceAccountName
          value: RELEASE-NAME-loki-canary

  - it: explicitly creates and uses canary service account when enabled
    set:
      lokiCanary.serviceAccount.create: true
    asserts:
      - template: loki-canary/daemonset.yaml
        equal:
          path: spec.template.spec.serviceAccountName
          value: RELEASE-NAME-loki-canary
      - template: loki-canary/serviceaccount.yaml
        hasDocuments:
          count: 1
      - template: loki-canary/serviceaccount.yaml
        equal:
          path: metadata.name
          value: RELEASE-NAME-loki-canary

  - it: explicitly creates and uses canary service account on Deployment workload
    set:
      lokiCanary.kind: Deployment
      lokiCanary.serviceAccount.create: true
    asserts:
      - template: loki-canary/daemonset.yaml
        equal:
          path: kind
          value: Deployment
      - template: loki-canary/daemonset.yaml
        equal:
          path: spec.template.spec.serviceAccountName
          value: RELEASE-NAME-loki-canary
      - template: loki-canary/serviceaccount.yaml
        hasDocuments:
          count: 1

  - it: uses component serviceAccount.name when provided
    set:
      lokiCanary.serviceAccount.create: false
      lokiCanary.serviceAccount.name: canary-custom-sa
    asserts:
      - template: loki-canary/daemonset.yaml
        equal:
          path: spec.template.spec.serviceAccountName
          value: canary-custom-sa
      - template: loki-canary/serviceaccount.yaml
        hasDocuments:
          count: 0

  - it: uses component serviceAccount.name on Deployment workload kind
    set:
      lokiCanary.kind: Deployment
      lokiCanary.serviceAccount.create: false
      lokiCanary.serviceAccount.name: canary-custom-sa
    asserts:
      - template: loki-canary/daemonset.yaml
        equal:
          path: kind
          value: Deployment
      - template: loki-canary/daemonset.yaml
        equal:
          path: spec.template.spec.serviceAccountName
          value: canary-custom-sa

  - it: falls back to global serviceAccount.name when component account is disabled
    set:
      lokiCanary.serviceAccount.create: false
      serviceAccount.create: false
      serviceAccount.name: global-custom-sa
    asserts:
      - template: loki-canary/daemonset.yaml
        equal:
          path: spec.template.spec.serviceAccountName
          value: global-custom-sa

  - it: sets ServiceAccount automountServiceAccountToken from canary serviceAccount config
    set:
      lokiCanary.serviceAccount.automountServiceAccountToken: false
    asserts:
      - template: loki-canary/serviceaccount.yaml
        equal:
          path: automountServiceAccountToken
          value: false

  - it: sets pod automountServiceAccountToken when canary value is explicitly true
    set:
      lokiCanary.kind: Deployment
      lokiCanary.automountServiceAccountToken: true
    asserts:
      - template: loki-canary/daemonset.yaml
        equal:
          path: spec.template.spec.automountServiceAccountToken
          value: true

  - it: sets pod automountServiceAccountToken when canary value is explicitly false
    set:
      lokiCanary.kind: Deployment
      lokiCanary.automountServiceAccountToken: false
    asserts:
      - template: loki-canary/daemonset.yaml
        equal:
          path: spec.template.spec.automountServiceAccountToken
          value: false
