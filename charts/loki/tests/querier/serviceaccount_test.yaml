# $schema: https://raw.githubusercontent.com/helm-unittest/helm-unittest/refs/heads/main/schema/helm-testsuite.json
suite: querier service account
templates:
  - querier/deployment-querier.yaml
  - querier/serviceaccount.yaml
  - config.yaml

set:
  deploymentMode: Distributed
  loki.useTestSchema: true
  loki.storage.bucketNames.chunks: chunks
  loki.storage.bucketNames.ruler: ruler
  loki.storage.bucketNames.admin: admin

tests:
  - it: uses global service account name by default
    asserts:
      - template: querier/deployment-querier.yaml
        equal:
          path: spec.template.spec.serviceAccountName
          value: RELEASE-NAME-loki
      - template: querier/serviceaccount.yaml
        hasDocuments:
          count: 0

  - it: uses querier generated service account name when querier account is created
    set:
      querier.serviceAccount.create: true
    asserts:
      - template: querier/deployment-querier.yaml
        equal:
          path: spec.template.spec.serviceAccountName
          value: RELEASE-NAME-loki-querier
      - template: querier/serviceaccount.yaml
        equal:
          path: metadata.name
          value: RELEASE-NAME-loki-querier

  - it: uses querier serviceAccount.name override
    set:
      querier.serviceAccount.create: false
      querier.serviceAccount.name: querier-custom-sa
      serviceAccount.name: global-custom-sa
    asserts:
      - template: querier/deployment-querier.yaml
        equal:
          path: spec.template.spec.serviceAccountName
          value: querier-custom-sa

  - it: sets querier ServiceAccount automountServiceAccountToken when creating querier account
    set:
      querier.serviceAccount.create: true
      querier.serviceAccount.automountServiceAccountToken: false
    asserts:
      - template: querier/serviceaccount.yaml
        equal:
          path: automountServiceAccountToken
          value: false

  - it: sets querier pod automountServiceAccountToken when querier value is explicitly true
    set:
      querier.automountServiceAccountToken: true
    asserts:
      - template: querier/deployment-querier.yaml
        equal:
          path: spec.template.spec.automountServiceAccountToken
          value: true

  - it: sets querier pod automountServiceAccountToken when querier value is explicitly false
    set:
      querier.automountServiceAccountToken: false
    asserts:
      - template: querier/deployment-querier.yaml
        equal:
          path: spec.template.spec.automountServiceAccountToken
          value: false
