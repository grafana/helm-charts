# $schema: https://raw.githubusercontent.com/helm-unittest/helm-unittest/refs/heads/main/schema/helm-testsuite.json
suite: compactor service account
templates:
  - compactor/statefulset.yaml
  - compactor/serviceaccount.yaml
  - config.yaml

set:
  deploymentMode: Distributed
  loki.useTestSchema: true
  loki.storage.bucketNames.chunks: chunks
  loki.storage.bucketNames.ruler: ruler
  loki.storage.bucketNames.admin: admin

tests:
  - it: uses global service account name by default
    asserts:
      - template: compactor/statefulset.yaml
        equal:
          path: spec.template.spec.serviceAccountName
          value: RELEASE-NAME-loki
      - template: compactor/serviceaccount.yaml
        hasDocuments:
          count: 0

  - it: uses compactor generated service account name when compactor account is created
    set:
      compactor.serviceAccount.create: true
    asserts:
      - template: compactor/statefulset.yaml
        equal:
          path: spec.template.spec.serviceAccountName
          value: RELEASE-NAME-loki-compactor
      - template: compactor/serviceaccount.yaml
        equal:
          path: metadata.name
          value: RELEASE-NAME-loki-compactor

  - it: uses compactor serviceAccount.name override
    set:
      compactor.serviceAccount.create: false
      compactor.serviceAccount.name: compactor-custom-sa
      serviceAccount.name: global-custom-sa
    asserts:
      - template: compactor/statefulset.yaml
        equal:
          path: spec.template.spec.serviceAccountName
          value: compactor-custom-sa

  - it: sets compactor ServiceAccount automountServiceAccountToken when creating compactor account
    set:
      compactor.serviceAccount.create: true
      compactor.serviceAccount.automountServiceAccountToken: false
    asserts:
      - template: compactor/serviceaccount.yaml
        equal:
          path: automountServiceAccountToken
          value: false

  - it: sets compactor pod automountServiceAccountToken when compactor value is explicitly true
    set:
      compactor.automountServiceAccountToken: true
    asserts:
      - template: compactor/statefulset.yaml
        equal:
          path: spec.template.spec.automountServiceAccountToken
          value: true

  - it: sets compactor pod automountServiceAccountToken when compactor value is explicitly false
    set:
      compactor.automountServiceAccountToken: false
    asserts:
      - template: compactor/statefulset.yaml
        equal:
          path: spec.template.spec.automountServiceAccountToken
          value: false
