# $schema: https://raw.githubusercontent.com/helm-unittest/helm-unittest/refs/heads/main/schema/helm-testsuite.json
suite: ruler image
templates:
  - ruler/statefulset.yaml
  - config.yaml
set:
  deploymentMode: Distributed
  loki.useTestSchema: true
  loki.image.tag: 0.0.0
  loki.storage.bucketNames.chunks: chunks
  loki.storage.bucketNames.ruler: ruler
  loki.storage.bucketNames.admin: admin

tests:
  - it: should use loki image defaults when ruler image is not set
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: docker.io/grafana/loki:0.0.0
        template: ruler/statefulset.yaml

  - it: should override repository and tag at ruler component level
    set:
      ruler.image.repository: custom/loki-ruler
      ruler.image.tag: custom-tag
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: docker.io/custom/loki-ruler:custom-tag
        template: ruler/statefulset.yaml

  - it: should override registry at ruler component level
    set:
      ruler.image.registry: quay.io
      ruler.image.repository: custom/loki-ruler
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: quay.io/custom/loki-ruler:0.0.0
        template: ruler/statefulset.yaml

  - it: should let global imageRegistry override ruler and loki registries
    set:
      global.imageRegistry: registry.example.com
      ruler.image.registry: quay.io
      ruler.image.repository: custom/loki-ruler
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: registry.example.com/custom/loki-ruler:0.0.0
        template: ruler/statefulset.yaml

  - it: should keep fully qualified ruler repository without global imageRegistry prefix
    set:
      global.imageRegistry: registry.example.com
      ruler.image.repository: ghcr.io/custom/loki-ruler
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/custom/loki-ruler:0.0.0
        template: ruler/statefulset.yaml

  - it: should support deprecated global.image.registry override
    set:
      global.image.registry: deprecated.registry.example.com
      ruler.image.repository: custom/loki-ruler
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: deprecated.registry.example.com/custom/loki-ruler:0.0.0
        template: ruler/statefulset.yaml

  - it: should support deprecated global.registry override
    set:
      global.registry: deprecated2.registry.example.com
      ruler.image.repository: custom/loki-ruler
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: deprecated2.registry.example.com/custom/loki-ruler:0.0.0
        template: ruler/statefulset.yaml

  - it: should let ruler image tag override loki image tag
    set:
      ruler.image.tag: ruler-tag
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: docker.io/grafana/loki:ruler-tag
        template: ruler/statefulset.yaml

  - it: should prefer ruler image digest over tag
    set:
      ruler.image.repository: custom/loki-ruler
      ruler.image.tag: ignored-tag
      ruler.image.digest: sha256:d1g357
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: docker.io/custom/loki-ruler@sha256:d1g357
        template: ruler/statefulset.yaml

  - it: should use ruler image sha as digest fallback when digest is not set
    set:
      ruler.image.repository: custom/loki-ruler
      ruler.image.tag: ignored-tag
      ruler.image.sha: abcdef0123456789
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: docker.io/custom/loki-ruler@sha256:abcdef0123456789
        template: ruler/statefulset.yaml

  - it: should prefer ruler digest over loki digest
    set:
      ruler.image.repository: custom/loki-ruler
      ruler.image.digest: sha256:component
      loki.image.digest: sha256:default
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: docker.io/custom/loki-ruler@sha256:component
        template: ruler/statefulset.yaml

  - it: should prefer global.imageRegistry over deprecated global registry keys
    set:
      global.imageRegistry: current.registry.example.com
      global.image.registry: deprecated.registry.example.com
      global.registry: deprecated2.registry.example.com
      ruler.image.repository: custom/loki-ruler
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: current.registry.example.com/custom/loki-ruler:0.0.0
        template: ruler/statefulset.yaml

  - it: should prefer deprecated global.image.registry over deprecated global.registry when imageRegistry is unset
    set:
      global.image.registry: preferred.registry.example.com
      global.registry: fallback.registry.example.com
      ruler.image.repository: custom/loki-ruler
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: preferred.registry.example.com/custom/loki-ruler:0.0.0
        template: ruler/statefulset.yaml

  - it: should use default loki image digest when ruler image is not set
    set:
      loki.image.digest: sha256:defaultdigest
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: docker.io/grafana/loki@sha256:defaultdigest
        template: ruler/statefulset.yaml

  - it: should use default loki image sha as digest fallback when digest is not set and ruler image is not set
    set:
      loki.image.sha: deadbeef01234567
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: docker.io/grafana/loki@sha256:deadbeef01234567
        template: ruler/statefulset.yaml
