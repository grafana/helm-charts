deploymentMode: Distributed
loki:
  commonConfig:
    replication_factor: 1
  useTestSchema: true
  storage:
    bucketNames:
      chunks: chunks
      ruler: ruler
      admin: admin
  kedaAutoscaling:
    prometheusAddress: http://prometheus:9090
    customHeaders: X-Scope-OrgID=tenant1
# Disable scalable-mode targets
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0
# Disable non-essential distributed components to speed up CI
compactor:
  replicas: 0
indexGateway:
  replicas: 0
ruler:
  replicas: 0
# Minimum components required for querier readiness
distributor:
  replicas: 1
  kedaAutoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 10
    fallback:
      failureThreshold: 1
      replicas: 1
    triggers:
      - type: prometheus
        name: distributor_autoscaling_metric
        metadata:
          serverAddress: "{{ .Values.defaults.kedaAutoscaling.prometheusAddress }}"
          query: sum(rate(loki_distributor_bytes_received_total[2m]))
          threshold: "1000000"
          unsafeSsl: "{{ .Values.defaults.kedaAutoscaling.unsafeSsl }}"
          ignoreNullValues: "{{ .Values.defaults.kedaAutoscaling.ignoreNullValues }}"
          customHeaders: "{{ .Values.defaults.kedaAutoscaling.customHeaders }}"
          authModes: "{{ .Values.defaults.kedaAutoscaling.authentication.authModes }}"
ingester:
  replicas: 1
  zoneAwareReplication:
    enabled: false
queryFrontend:
  replicas: 1
queryScheduler:
  replicas: 1
querier:
  replicas: 1
  kedaAutoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 20
    # No Prometheus in CI — fall back to minReplicas immediately on trigger failure
    fallback:
      failureThreshold: 1
      replicas: 1
